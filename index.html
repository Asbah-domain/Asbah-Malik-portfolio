<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asbah Arshad - Web Developer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* GLOBAL FIX (IMPORTANT) */
* {
    box-sizing: border-box;
}

body {
    overflow-x: hidden;
    background: #ffffff;
    color: #333;
}

/* NAVBAR */
.navbar {
    background: #000 !important;
}

.navbar-brand, .nav-link {
    color: #fff !important;
}

.nav-link:hover {
    color: #0d6efd !important;
}

.navbar-toggler-icon {
    filter: invert(1);
}

/* HERO */
.hero {
    background: #f8f9fa;
    padding: 100px 0;
}

/* SECTIONS */
.section-padding {
    padding: 70px 0;
}

.light-section {
    background: #f8f9fa;
}

/* BUTTON */
.btn-custom {
    background: #0d6efd;
    border-radius: 30px;
    padding: 12px 30px;
    color: white;
}

/* SKILLS CIRCLE FIX */
.skills-circle {
    position: relative;
    width: 400px;
    height: 400px;
    margin: 50px auto;
    animation: rotate 15s linear infinite;
    max-width: 100%;
}

/* SKILL ITEMS */
.skill-item {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
}

/* COLORS + POSITION */
.skill1 { top: 0; left: 150px; background:#CE2626; }
.skill2 { top: 150px; left: 0; background:#7FB77E; }
.skill3 { top: 150px; right: 0; background:#D12052; }
.skill4 { bottom: 0; left: 150px; background:#1A3263; }
.skill5 { top: 150px; left: 150px; background:#9B0F06; }

/* ROTATION */
@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* CARDS */
.card-hover:hover {
    transform: translateY(-8px);
    transition: 0.3s;
}

/* FOOTER */
footer {
    background: #000;
    color: #fff;
}

/* =========================
   MOBILE RESPONSIVE FIX
========================= */
@media (max-width: 768px) {

    .hero {
        padding: 80px 15px;
        text-align: center;
    }

    .skills-circle {
        width: 280px;
        height: 280px;
    }

    .skill-item {
        width: 65px;
        height: 65px;
        font-size: 12px;
    }

    .skill1 { left: 110px; }
    .skill2 { top: 110px; }
    .skill3 { top: 110px; }
    .skill4 { left: 110px; }
    .skill5 { top: 110px; left: 110px; }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">
    <a class="navbar-brand" href="#">Asbah Arshad</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
            <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
            <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
        </ul>
    </div>
</div>
</nav>

<!-- HERO -->
<section id="home" class="hero text-center">
<div class="container">
    <h1 class="fw-bold">Hi! I'm Asbah Arshad</h1>
    <p class="lead">Web Developer | BSCS</p>
    <a href="#projects" class="btn btn-custom">Projects</a>
</div>
</section>

<!-- SKILLS -->
<section id="skills" class="light-section section-padding">
<div class="container text-center">
    <h2>My Skills</h2>

    <div class="skills-circle">
        <div class="skill-item skill1">HTML</div>
        <div class="skill-item skill2">CSS</div>
        <div class="skill-item skill3">JS</div>
        <div class="skill-item skill4">Bootstrap</div>
        <div class="skill-item skill5">Python</div>
    </div>
</div>
</section>

<!-- PROJECTS -->
<section id="projects" class="section-padding">
<div class="container text-center">
    <h2>Featured Project</h2>

    <div class="row g-3 mt-4">
        <div class="col-md-3 col-6"><div class="card p-3">Login</div></div>
        <div class="col-md-3 col-6"><div class="card p-3">Courses</div></div>
        <div class="col-md-3 col-6"><div class="card p-3">Responsive</div></div>
        <div class="col-md-3 col-6"><div class="card p-3">UI</div></div>
    </div>
</div>
</section>

<!-- FOOTER -->
<footer class="text-center py-3">
    <p>© 2026 Asbah Arshad</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
